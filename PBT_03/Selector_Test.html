<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selector_test</title>

  <style>

    /* 1. h1 */
    h1 {
      color: red;
    }

    /* 2. .price */
    .price {
      color: blue;
    }

    /* 3. #app header */
    #app header {
      background: lightgray;
    }

    /* 4. nav a:first-child */
    nav a:first-child {
      font-weight: bold;
    }

    /* 5. .product.featured h2 */
    .product.featured h2 {
      font-size: 40px;
    }

    /* 6. article > p */
    article > p {
      border: 1px solid black;
    }

    /* 7. a[href="/"] */
    a[href="/"] {
      color: green;
    }

    /* 8. .top-bar.dark h1 */
    .top-bar.dark h1 {
      background: yellow;
    }

  </style>
</head>

<body>

<div id="app">

  <header class="top-bar dark">
    <h1>ShopTLU</h1>

    <nav>
      <a href="/" class="active">Home</a>
      <a href="/products">Products</a>
      <a href="/about">About</a>
    </nav>
  </header>

  <main>

    <article class="product">
      <h2>iPhone 16</h2>
      <p class="price">25.990.000đ</p>
      <p>Mô tả sản phẩm...</p>
    </article>

    <article class="product featured">
      <h2>MacBook Pro</h2>
      <p class="price">45.990.000đ</p>
      <p>Mô tả sản phẩm...</p>
    </article>

  </main>

</div>

</body>
</html>

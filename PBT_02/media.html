<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Multimedia</title>
</head>
<body>

<h1>Giới thiệu sản phẩm Laptop</h1>

<section>
    <h2>Hình ảnh sản phẩm</h2>

    <figure>
        <img src="https://via.placeholder.com/400x250"
             alt="Laptop Lenovo ThinkPad màu đen"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>Lenovo ThinkPad — Hiệu năng mạnh mẽ</figcaption>
    </figure>

    <figure>
        <img src="https://via.placeholder.com/400x250"
             alt="Laptop gaming RGB bàn phím sáng"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>Laptop Gaming — Trải nghiệm mượt mà</figcaption>
    </figure>

    <figure>
        <img src="https://via.placeholder.com/400x250"
             alt="Laptop mỏng nhẹ màu bạc văn phòng"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>Laptop văn phòng — Nhẹ và tiện lợi</figcaption>
    </figure>
</section>

<hr>

<section>
    <h2>Video giới thiệu (YouTube)</h2>

    <iframe 
        width="560" 
        height="315"
        src="https://www.youtube.com/embed/tgbNymZ7vqY"
        title="Video giới thiệu sản phẩm"
        style="border:0;"
        allowfullscreen>
    </iframe>
</section>

<hr>

<section>
    <h2>Video demo (HTML5)</h2>

    <video controls poster="https://via.placeholder.com/560x315" style="max-width:100%;">
        <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
        <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm" type="video/webm">
        Trình duyệt không hỗ trợ video.
    </video>
</section>

<hr>

<section>
    <h2>Nhạc nền</h2>

    <audio controls>
        <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3" type="audio/mpeg">
        Trình duyệt không hỗ trợ audio.
    </audio>
</section>

<hr>

<section>
    <h2>Logo</h2>

    <svg width="120" height="120">
        <circle cx="60" cy="60" r="50" fill="blue"></circle>
        <text x="50%" y="55%" text-anchor="middle" fill="white" font-size="20">
            L
        </text>
    </svg>
</section>

</body>
</html>
